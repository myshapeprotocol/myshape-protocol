<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340">
  <defs>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Brush stroke crescent:
    - Starts at 12 o'clock (thick, ~6px)
    - Sweeps clockwise: 12→11→10→9→8→7→6→5→4→3→2
    - Ends at 2 o'clock (tapered to ~1px)
    - Outer radius 88, inner radius tapers from 82→87
  -->
  <path d="
    M 200 62
    A 88 88 0 1 1 276.2 106
    L 275.3 106.5
    A 87 87 0 0 0 200 63
    Z
  " fill="url(#strokeGrad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Small starting dot at 12 o'clock — where the brush first touched -->
  <circle cx="200" cy="64" r="3" fill="#3B82F6" opacity="0.7"/>

  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="300" fill="rgba(255,255,255,0.82)" letter-spacing="0.06em">The Continuity Lab</text>
  <text x="200" y="304" text-anchor="middle" font-family="monospace" font-size="9.5" fill="rgba(255,255,255,0.28)" letter-spacing="0.22em">CONTINUITY · EVIDENCE · VERIFICATION</text>
</svg>
